<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
  <meta name="color-scheme" content="dark" />
  <title>PROJECTKIDCREATIONS // ENGINEERED REBELLION</title>
  <meta name="description" content="Custom-engineered gel blaster mods and tactical accessories. Precision-printed aggression.">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath d='M0 0h24l8 8v24H0z' fill='%23FF5F1F'/%3E%3C/svg%3E">

  <style>
    /* Self-hosted fonts (latin subset). Drop-in replacements for the
       Google Fonts CSS that was previously fetched at runtime. */
    @font-face {
      font-family: 'Archivo Black';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url('/assets/fonts/archivo-black-latin.woff2') format('woff2');
      unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
    }
    @font-face {
      font-family: 'JetBrains Mono';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url('/assets/fonts/jetbrains-mono-latin.woff2') format('woff2');
      unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
    }
    @font-face {
      font-family: 'JetBrains Mono';
      font-style: normal;
      font-weight: 500;
      font-display: swap;
      src: url('/assets/fonts/jetbrains-mono-latin.woff2') format('woff2');
      unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
    }
    @font-face {
      font-family: 'JetBrains Mono';
      font-style: normal;
      font-weight: 700;
      font-display: swap;
      src: url('/assets/fonts/jetbrains-mono-latin.woff2') format('woff2');
      unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
    }

    :root {
      color-scheme: dark;
      --pkc-tac-black: #0A0A0A;
      --pkc-hi-vis: #FF5F1F;
      --pkc-slate: #3F4448;
      --pkc-ghost: #1A1C1E;
      --pkc-concrete: #E8E8E8;
      --pkc-text-muted: #9AA0A4;
      --pkc-border-strong: #5A5F63;
      --pkc-surface-raised: #24272A;
      --ease-snappy: cubic-bezier(0.2, 0.8, 0.2, 1);
      --ease-scan: steps(8, end);
    }
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0; padding: 0;
      background: #0A0A0A; color: #E8E8E8;
      font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 16px; line-height: 1.5; letter-spacing: 0.01em;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }
    ::selection { background: #FF5F1F; color: #0A0A0A; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0A0A0A; }
    ::-webkit-scrollbar-thumb { background: #3F4448; }

    @keyframes pkc-status-pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0; }
    }

    @keyframes pkc-marquee {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }
    .pkc-marquee-viewport:hover .pkc-marquee-track,
    .pkc-marquee-viewport:focus-within .pkc-marquee-track {
      animation-play-state: paused;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        transition-duration: 0.001ms !important;
      }
      /* Keep the featured-mods marquee running at its full duration; some
         browsers report reduce-motion even when the OS toggle is off, and
         the slow 60 s pace is not vestibular-aggressive. */
      .pkc-marquee-track {
        animation-duration: 60s !important;
      }
    }
  </style>
</head>
<body>

<div id="root"></div>

<script type="module" src="/dist/landing.js"></script>

</body>
</html>
