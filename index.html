<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <meta name="robots" content="noindex">
  <meta http-equiv="Cache-Control" content="no-store">
  <title>PROJECTKIDCREATIONS // ROUTING</title>
  <meta name="description" content="ProjectKidCreations — routing to your next step.">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath d='M0 0h24l8 8v24H0z' fill='%23FF5F1F'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --pkc-tac-black: #0A0A0A;
      --pkc-hi-vis:    #FF5F1F;
      --pkc-slate:     #3F4448;
      --pkc-text:      #E8E8E8;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      background: var(--pkc-tac-black);
      color: var(--pkc-text);
      font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 14px;
      letter-spacing: 0.04em;
      display: grid;
      place-items: center;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    /* Scan-line texture, matches landing brand chrome */
    body::before {
      content: "";
      position: fixed; inset: 0;
      pointer-events: none;
      opacity: 0.025;
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(255,255,255,0.5) 2px, rgba(255,255,255,0.5) 3px
      );
    }
    .stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      text-align: center;
    }
    .mark {
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -0.5px;
      color: var(--pkc-text);
      text-transform: uppercase;
    }
    .mark span { color: var(--pkc-hi-vis); }
    .status {
      color: var(--pkc-slate);
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.12em;
    }
    .bar {
      width: 240px;
      height: 1px;
      background: rgba(63, 68, 72, 0.4);
      position: relative;
      overflow: hidden;
    }
    .bar::after {
      content: "";
      position: absolute; top: 0; bottom: 0; left: -40%;
      width: 40%;
      background: var(--pkc-hi-vis);
      animation: sweep 1.4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    @keyframes sweep {
      from { left: -40%; }
      to   { left: 100%; }
    }
    @media (prefers-reduced-motion: reduce) {
      .bar::after { animation: none; left: 0; width: 100%; opacity: 0.4; }
    }
    .fallback {
      max-width: 520px;
      padding: 24px;
      border: 1px solid var(--pkc-slate);
      color: var(--pkc-text);
    }
    .fallback h1 {
      font: 700 14px/1.4 'JetBrains Mono', monospace;
      margin: 0 0 12px; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--pkc-hi-vis);
    }
    .fallback p { margin: 0 0 8px; font-size: 13px; line-height: 1.6; color: var(--pkc-text); }
    .fallback a { color: var(--pkc-hi-vis); }
  </style>
</head>
<body>
  <noscript>
    <main class="fallback">
      <h1>// SCRIPT REQUIRED</h1>
      <p>Routing needs JavaScript. Head to <a href="/phase-one/">// PHASE ONE</a> to begin onboarding, or <a href="/account/login/">// SIGN IN</a> if you already have an operator account.</p>
    </main>
  </noscript>

  <div class="stage" aria-live="polite">
    <div class="mark">PROJECT<span>KID</span>CREATIONS</div>
    <div class="bar" aria-hidden="true"></div>
    <p class="status" id="status">// CHECKING SESSION</p>
  </div>

  <script>
    // ── Splash hold: floor the splash for HOLD_MS while the auth probe and
    //    asset prefetches run in parallel. Hold is a FLOOR only — if the probe
    //    takes longer than HOLD_MS, we wait for it.
    var HOLD_MS_FULL    = 2000;
    var HOLD_MS_REDUCED = 300;
    var HOLD_MS = window.matchMedia &&
                  window.matchMedia('(prefers-reduced-motion: reduce)').matches
      ? HOLD_MS_REDUCED : HOLD_MS_FULL;
    var PROBE_TIMEOUT_MS = 4000;

    function prefetch(href, opts) {
      opts = opts || {};
      var link = document.createElement('link');
      link.rel = 'prefetch';
      link.href = href;
      if (opts.as) link.as = opts.as;
      if (opts.crossorigin) link.crossOrigin = 'anonymous';
      document.head.appendChild(link);
    }

    // Both destinations' HTML — whichever way we route, the doc is hot.
    prefetch('/phase-one/',   { as: 'document' });
    prefetch('/landing.html', { as: 'document' });

    // Landing's React components + tweaks panel (small, cheap to warm).
    ['/components/Nav.jsx',
     '/components/Hero.jsx',
     '/components/Products.jsx',
     '/components/ValueProps.jsx',
     '/components/Sections.jsx',
     '/tweaks-panel.jsx'].forEach(function (p) { prefetch(p, { as: 'script' }); });

    // Three.js + GLTFLoader from unpkg.
    prefetch('https://unpkg.com/three@0.160.0/build/three.module.js',
             { as: 'script', crossorigin: true });
    prefetch('https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js',
             { as: 'script', crossorigin: true });

    function prefetchGLB() {
      // 11 MB — gated on a 200 from the probe so phase-one routes pay nothing.
      prefetch('/assets/models/splatrball-400.glb', { as: 'fetch' });
    }

    (async function route() {
      var PHASE_ONE = '/phase-one/';
      var LANDING   = '/landing.html';
      var startedAt = performance.now();

      var probePromise = (async function () {
        var ctrl = new AbortController();
        var t = setTimeout(function () { ctrl.abort(); }, PROBE_TIMEOUT_MS);
        try {
          var res = await fetch('/api/account/profile', {
            method: 'GET',
            credentials: 'include',
            signal: ctrl.signal,
            cache: 'no-store',
          });
          clearTimeout(t);
          return { ok: res.ok };
        } catch (_err) {
          clearTimeout(t);
          return { ok: false };
        }
      })();

      // Kick off GLB prefetch the instant we know the user is signed in.
      probePromise.then(function (r) { if (r.ok) prefetchGLB(); });

      var holdPromise = new Promise(function (resolve) {
        var elapsed = performance.now() - startedAt;
        setTimeout(resolve, Math.max(0, HOLD_MS - elapsed));
      });

      var results = await Promise.all([probePromise, holdPromise]);
      location.replace(results[0].ok ? LANDING : PHASE_ONE);
    })();
  </script>
</body>
</html>
